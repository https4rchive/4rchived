<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4rchived</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #1030c2;
      color: white;
      font-family: 'Helvetica Neue', sans-serif;
    }

    header {
      padding: 2rem;
      font-size: 2rem;
      font-weight: bold;
    }

    .tagline {
      font-size: 1rem;
      color: #d0dfff;
      margin-top: 0.3rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 2rem;
    }

    .gallery img {
      width: 100%;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
      transition: transform 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.015);
    }

    footer {
      text-align: center;
      font-size: 0.9rem;
      padding: 2rem;
      color: #d0dfff;
    }
  </style>
</head>
<body>
  <header>
    4rchived
    <div class="tagline">a visual archive for the locals</div>
  </header>

  <section class="gallery">
    <!-- Adaugă aici imaginile tale -->
    <img src="images/photo1.jpg" alt="photo 1">
    <img src="images/photo2.jpg" alt="photo 2">
    <img src="images/photo3.jpg" alt="photo 3">
    <img src="images/photo4.jpg" alt="photo 4">
  </section>

  <footer>
    &copy; 2025 4rchived — curated visuals only
  </footer>
</body>
</html>
