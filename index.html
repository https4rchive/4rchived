<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4rchived</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Europa+Grotesk+SH+Med&display=swap">
    <style>
      body {
        font-family: 'Europa Grotesk SH Med', sans-serif;
        margin: 0;
        overflow-x: hidden;
        background-color: #000000;
        color: white;
      }

      .line {
        width: 100%;
        height: 1px;
        background-color: white;
        opacity: 0.3;
      }

      header {
        position: fixed;
        top: 0;
        width: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(10px);
        padding: 16px 32px;
        z-index: 1000;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      header h1 {
        font-size: 2.5rem;
        color: white;
        cursor: pointer;
        transition: transform 0.3s ease;
      }

      header h1:hover {
        transform: scale(1.1);
      }

      nav a {
        color: white;
        text-decoration: none;
        padding: 0.5rem;
        transition: color 0.3s ease;
      }

      nav a:hover {
        color: #131DEA;
      }

      section#home {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 40px;
      }

      section#home h2 {
        font-size: 5rem;
        margin-bottom: 20px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 5px;
        opacity: 0;
        transform: translateY(30px);
        animation: fadeIn 1.5s forwards;
      }

      section#home p {
        font-size: 2rem;
        margin-top: 10px;
        opacity: 0;
        transform: translateY(30px);
        animation: fadeIn 2s forwards;
      }

      /* NEW: Under Construction Animation */
      .fadeInUp {
        animation: fadeInUp 2s ease forwards;
        opacity: 0;
        transform: translateY(40px);
      }

      @keyframes fadeInUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      section#gallery {
        padding: 60px 0;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        text-align: center;
      }

      .gallery-item {
        margin: 10px;
        width: 300px;
        height: 400px;
        border-radius: 15px;
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.3s ease-in-out;
      }

      .gallery-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.3s ease-in-out;
      }

      .gallery-item:hover {
        transform: scale(1.05);
      }

      .gallery-list {
        display: block;
      }

      .gallery-slider {
        overflow-x: auto;
        white-space: nowrap;
        padding-bottom: 20px;
      }

      #toggleSlider, #toggleList {
        background-color: rgba(255, 255, 255, 0.4);
        color: white;
        border: none;
        padding: 10px 20px;
        font-size: 1rem;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin: 10px;
      }

      #toggleSlider:hover, #toggleList:hover {
        background-color: rgba(255, 255, 255, 0.6);
        transform: scale(1.05);
      }

      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 2000;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease;
      }

      .modal.active {
        display: flex;
        opacity: 1;
        visibility: visible;
      }

      .modal-content {
        position: relative;
        max-width: 80%;
        max-height: 80%;
        padding: 20px;
        background-color: #fff;
        border-radius: 10px;
      }

      .modal-content img {
        width: 100%;
        height: auto;
        border-radius: 10px;
      }

      .modal-caption {
        text-align: center;
        font-size: 1.25rem;
        margin-top: 20px;
        color: white;
      }

      footer {
        text-align: center;
        padding: 20px;
        background-color: #1a1a1a;
        color: white;
        font-size: 0.875rem;
      }

      @media (max-width: 768px) {
        section#home h2 {
          font-size: 3rem;
        }

        section#home p {
          font-size: 1.25rem;
        }

        .gallery-item {
          width: 90%;
          height: 250px;
        }

        header h1 {
          font-size: 2rem;
        }

        .gallery-slider {
          display: block;
        }

        #slider {
          display: block;
        }

        .gallery-list {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <!-- Linie albă -->
    <div class="line"></div>

    <!-- Header -->
    <header>
      <h1>4rchived</h1>
      <nav>
        <a href="#home">Home</a>
        <a href="#gallery">Gallery</a>
      </nav>
    </header>

    <!-- Hero Section -->
    <section id="home">
      <h2>4rchived</h2>
      <p>a visual archive for the locals</p>
    </section>

    <!-- Under Construction Message -->
    <div class="text-center text-4xl md:text-6xl font-bold text-white mt-10 mb-10 fadeInUp">
      THIS SITE IS UNDER CONSTRUCTION
    </div>

    <!-- Gallery -->
    <section id="gallery">
      <div class="mb-6">
        <button id="toggleSlider" class="bg-blue-500 text-white px-4 py-2 rounded-md mr-2">Slider</button>
        <button id="toggleList" class="bg-green-500 text-white px-4 py-2 rounded-md">List</button>
      </div>

      <div id="slider" class="gallery-slider">
        <div class="gallery-item" onclick="openModal('https://via.placeholder.com/600x800?text=Image+1', 'Image 1')">
          <img src="https://via.placeholder.com/600x800?text=Image+1" alt="Image 1" />
        </div>
        <div class="gallery-item" onclick="openModal('https://via.placeholder.com/600x800?text=Image+2', 'Image 2')">
          <img src="https://via.placeholder.com/600x800?text=Image+2" alt="Image 2" />
        </div>
        <div class="gallery-item" onclick="openModal('https://via.placeholder.com/600x800?text=Image+3', 'Image 3')">
          <img src="https://via.placeholder.com/600x800?text=Image+3" alt="Image 3" />
        </div>
      </div>

      <div id="list" class="gallery-list hidden">
        <div class="gallery-item" onclick="openModal('https://via.placeholder.com/600x800?text=Image+1', 'Image 1')">
          <img src="https://via.placeholder.com/600x800?text=Image+1" alt="Image 1" />
        </div>
        <div class="gallery-item" onclick="openModal('https://via.placeholder.com/600x800?text=Image+2', 'Image 2')">
          <img src="https://via.placeholder.com/600x800?text=Image+2" alt="Image 2" />
        </div>
      </div>
    </section>

    <!-- Modal Viewer -->
    <div id="imageModal" class="modal" onclick="closeModal()">
      <div class="modal-content">
        <img id="modalImage" src="" alt="Expanded view" />
        <div class="modal-caption" id="modalCaption"></div>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      &copy; 2025 4rchived. All rights reserved.
    </footer>

    <script>
      function openModal(imgSrc, caption) {
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        const modalCaption = document.getElementById('modalCaption');
        modalImg.src = imgSrc;
        modalCaption.innerText = caption;
        modal.classList.add('active');
      }

      function closeModal() {
        document.getElementById('imageModal').classList.remove('active');
      }

      document.getElementById('toggleSlider').addEventListener('click', function () {
        document.getElementById('slider').classList.remove('hidden');
        document.getElementById('list').classList.add('hidden');
      });

      document.getElementById('toggleList').addEventListener('click', function () {
        document.getElementById('list').classList.remove('hidden');
        document.getElementById('slider').classList.add('hidden');
      });
    </script>
  </body>
</html>
